<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROBO ROLETA PRO</title>

<style>
body{
    background:#020617;
    color:#fff;
    font-family:Arial;
    text-align:center;
    margin:0;
    overflow:hidden;
}

/* FUNDO */
#fundo{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
    pointer-events:none;
}

/* ROLETA */
#roletaBox{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:320px;
    height:320px;
    opacity:0.06;
}

#aro{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:12px solid #6b4a1e;
}

#roleta{
    position:absolute;
    inset:12px;
    border-radius:50%;
    background:conic-gradient(
        red 0deg 30deg, black 30deg 60deg,
        red 60deg 90deg, black 90deg 120deg,
        red 120deg 150deg, black 150deg 180deg,
        red 180deg 210deg, black 210deg 240deg,
        red 240deg 270deg, black 270deg 300deg,
        red 300deg 330deg, green 330deg 360deg
    );
}

#bola{
    position:absolute;
    top:50%;
    left:50%;
    width:6px;
    height:6px;
    background:#fff;
    border-radius:50%;
    box-shadow:0 0 6px #fff;
}

/* EMOJIS */
.item{
    position:absolute;
    font-size:28px;
    opacity:0.35;
    animation:cair linear forwards;
}

@keyframes cair{
    0%{transform:translateY(-50px);}
    100%{transform:translateY(110vh);}
}

/* UI */
.container{
    position:relative;
    z-index:1;
}

#titulo{
    font-size:36px;
    font-weight:bold;
    text-shadow:0 0 12px #38bdf8;
}

#versao{
    font-size:14px;
    color:#aaa;
    margin-bottom:5px;
}

/* CONTADOR */
#placar{
    margin:10px 0;
    font-size:16px;
}

/* HISTÓRICO */
#historico{
    display:flex;
    overflow-x:auto;
    gap:6px;
    max-width:320px;
    margin:10px auto;
}

.bolinha{
    min-width:36px;
    height:36px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

.vermelho{
    background:#dc2626;
    box-shadow:0 0 8px #dc2626, 0 0 20px #dc2626;
}
.preto{
    background:#000;
    box-shadow:0 0 8px #fff, 0 0 20px #fff;
}
.verde{
    background:#16a34a;
    box-shadow:0 0 8px #16a34a, 0 0 20px #16a34a;
}

/* BOTÕES */
.grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:6px;
    max-width:320px;
    margin:15px auto;
}

.btn{
    background:#111;
    color:#fff;
    padding:12px;
    border:none;
}

/* STATUS */
#status{
    font-size:28px;
    margin-top:10px;
    font-weight:bold;
}

.win{
    color:#22c55e;
    animation:pulseWin 1.2s infinite;
}

.loss{
    color:#ef4444;
    animation:pulseLoss 1.2s infinite;
}

@keyframes pulseWin{
    0%{transform:scale(1);text-shadow:0 0 5px #22c55e;}
    50%{transform:scale(1.15);text-shadow:0 0 30px #22c55e;}
    100%{transform:scale(1);text-shadow:0 0 5px #22c55e;}
}

@keyframes pulseLoss{
    0%{transform:scale(1);text-shadow:0 0 5px #ef4444;}
    50%{transform:scale(1.15);text-shadow:0 0 30px #ef4444;}
    100%{transform:scale(1);text-shadow:0 0 5px #ef4444;}
}

/* ANALISE */
#analise{
    font-size:20px;
    color:#facc15;
}

/* ASSINATURA */
#assinatura{
    margin-top:15px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div id="fundo">
    <div id="roletaBox">
        <div id="aro"></div>
        <div id="roleta"></div>
        <div id="bola"></div>
    </div>
</div>

<div class="container">
    <div id="titulo">🎯 ROBO ROLETA PRO</div>
    <div id="versao">Versão PRO</div>

    <div id="placar">
        🟢 Vitórias: <span id="vitorias">0</span> |
        🔴 Derrotas: <span id="derrotas">0</span>
    </div>

    <div class="grid" id="botoes"></div>
    <div id="historico"></div>
    <div id="sugestao"></div>
    <div id="analise"></div>
    <div id="status"></div>

    <div id="assinatura">Desenvolvido por Henrique Sampaio</div>
</div>

<script>
// FUNDO ROLETA
let angulo = 0;
function animarFundo(){
    let roleta = document.getElementById("roleta");
    let bola = document.getElementById("bola");
    function loop(){
        angulo += 0.15;
        roleta.style.transform = `rotate(${angulo}deg)`;
        bola.style.transform = `rotate(${angulo*2}deg) translateX(120px)`;
        requestAnimationFrame(loop);
    }
    loop();
}
animarFundo();

// EMOJIS
const fundo = document.getElementById("fundo");
const itens = ["🎲","💰","🪙","🔴","⚫","🟢"];

setInterval(()=>{
    let el = document.createElement("div");
    el.className = "item";
    el.innerText = itens[Math.floor(Math.random()*itens.length)];
    el.style.left = Math.random()*100 + "vw";
    el.style.animationDuration = (8 + Math.random()*6) + "s";
    fundo.appendChild(el);
    setTimeout(()=> el.remove(),14000);
},500);

// ROBÔ
const vermelhos = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

let historico = [];
let entradaAtual = null;
let gale = 0;

let vitorias = 0;
let derrotas = 0;

function cor(n){
    if(n===0) return "verde";
    return vermelhos.includes(n) ? "vermelho" : "preto";
}

// BOTÕES
for(let i=0;i<=36;i++){
    let btn = document.createElement("button");
    btn.innerText = i;
    btn.className = "btn";
    btn.onclick = () => registrar(i);
    document.getElementById("botoes").appendChild(btn);
}

// REGISTRAR
function registrar(num){
    historico.push(num);

    let div = document.createElement("div");
    div.className = "bolinha " + cor(num);
    div.innerText = num;
    document.getElementById("historico").appendChild(div);

    document.getElementById("historico").scrollLeft =
        document.getElementById("historico").scrollWidth;

    if(entradaAtual){
        verificarResultado(num);
    } else {
        analisar();
    }
}

// ANALISE
let pontos = 0;
setInterval(()=>{
    if(!entradaAtual){
        pontos = (pontos+1)%4;
        document.getElementById("analise").innerText =
            "🎡 Em análise" + ".".repeat(pontos);
    }
},500);

function analisar(){
    if(historico.length < 10) return;

    let ultimos = historico.slice(-10);
    let cores = ultimos.map(cor);

    let vermelhosCount = cores.filter(c=>c==="vermelho").length;
    let pretosCount = cores.filter(c=>c==="preto").length;

    let sugestao = null;

    if(vermelhosCount >=7){
        sugestao = "preto";
    } else if(pretosCount >=7){
        sugestao = "vermelho";
    }

    if(!sugestao) return;

    document.getElementById("analise").innerText = "";
    entradaAtual = sugestao;

    document.getElementById("sugestao").innerHTML =
        "🎯 ENTRADA:<br>" + sugestao.toUpperCase() + " + (0)";
}

// RESULTADO
function verificarResultado(num){
    let ganhou = num===0 || cor(num)===entradaAtual;
    let status = document.getElementById("status");

    if(ganhou){
        vitorias++;
        document.getElementById("vitorias").innerText = vitorias;

        status.innerHTML = "✅ VITÓRIA";
        status.className = "win";
        entradaAtual = null;
    } else {
        if(gale===0){
            gale=1;
            status.innerHTML = "⚠️ GALE 1";
        } else {
            derrotas++;
            document.getElementById("derrotas").innerText = derrotas;

            status.innerHTML = "❌ DERROTA";
            status.className = "loss";
            entradaAtual = null;
            gale = 0;
        }
    }
}
</script>

</body>
</html>
