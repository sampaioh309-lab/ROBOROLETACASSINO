<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROBO ROLETA PRO</title>

<style>
body{background:#020617;color:#fff;font-family:Arial;text-align:center;margin:0;overflow:hidden;}
#fundo{position:fixed;width:100%;height:100%;z-index:0;pointer-events:none;}

#roletaBox{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:320px;height:320px;opacity:0.04;}
#aro{position:absolute;inset:0;border-radius:50%;border:12px solid #6b4a1e;}
#roleta{position:absolute;inset:12px;border-radius:50%;
background:conic-gradient(red 0 30deg,black 30 60deg,red 60 90deg,black 90 120deg,red 120 150deg,black 150 180deg,red 180 210deg,black 210 240deg,red 240 270deg,black 270 300deg,red 300 330deg,green 330 360deg);}
#bola{position:absolute;top:50%;left:50%;width:6px;height:6px;background:#fff;border-radius:50%;box-shadow:0 0 6px #fff;}

.item{position:absolute;font-size:28px;opacity:0.3;animation:cair linear forwards;}
@keyframes cair{0%{transform:translateY(-50px);}100%{transform:translateY(110vh);}}

/* UI */
.container{position:relative;z-index:1;}
#titulo{font-size:38px;font-weight:bold;text-shadow:0 0 15px #38bdf8;}

#placar{margin:10px 0;}

#historico{display:flex;overflow-x:auto;gap:6px;max-width:320px;margin:10px auto;}
.bolinha{min-width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;}
.vermelho{background:#dc2626;box-shadow:0 0 10px #dc2626;}
.preto{background:#000;box-shadow:0 0 10px #fff;}
.verde{background:#16a34a;box-shadow:0 0 10px #16a34a;}

.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;max-width:320px;margin:15px auto;}
.btn{background:#111;color:#fff;padding:12px;border:none;}

/* RESULTADO NEON */
#resultadoNeon{
    font-size:30px;
    font-weight:bold;
    margin-top:10px;
}

.win{color:#22c55e;animation:neonWin 1s infinite alternate;}
.loss{color:#ef4444;animation:neonLoss 1s infinite alternate;}
.gale{color:#facc15;animation:neonGale 1s infinite alternate;}

@keyframes neonWin{from{text-shadow:0 0 10px #22c55e;}to{text-shadow:0 0 40px #22c55e;}}
@keyframes neonLoss{from{text-shadow:0 0 10px #ef4444;}to{text-shadow:0 0 40px #ef4444;}}
@keyframes neonGale{from{text-shadow:0 0 10px #facc15;}to{text-shadow:0 0 40px #facc15;}}

#analise{color:#facc15;}
#assinatura{margin-top:10px;font-size:12px;color:#888;}
</style>
</head>

<body>

<div id="fundo">
<div id="roletaBox">
<div id="aro"></div>
<div id="roleta"></div>
<div id="bola"></div>
</div>
</div>

<div class="container">
<div id="titulo">🎯 ROBO ROLETA PRO</div>

<div id="placar">
🟢 Vitórias: <span id="vitorias">0</span> |
🔴 Derrotas: <span id="derrotas">0</span>
</div>

<div class="grid" id="botoes"></div>
<div id="historico"></div>

<div id="sugestao"></div>
<div id="resultadoNeon"></div>
<div id="analise"></div>

<div id="assinatura">Desenvolvido por Henrique Sampaio</div>
</div>

<script>

// FUNDO
let ang=0;
(function loop(){
    ang+=0.1;
    roleta.style.transform=`rotate(${ang}deg)`;
    bola.style.transform=`rotate(${ang*2}deg) translateX(120px)`;
    requestAnimationFrame(loop);
})();

// EMOJIS
const itens=["🎲","💰","🪙","🔴","⚫","🟢"];
setInterval(()=>{
    let el=document.createElement("div");
    el.className="item";
    el.innerText=itens[Math.floor(Math.random()*itens.length)];
    el.style.left=Math.random()*100+"vw";
    el.style.animationDuration=(8+Math.random()*5)+"s";
    fundo.appendChild(el);
    setTimeout(()=>el.remove(),14000);
},600);

// ROBÔ
const vermelhos=[1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];

let historico=[],entradaAtual=null,gale=0,vitorias=0,derrotas=0;
let esperandoNovoGiro=false;

function cor(n){
    if(n===0)return"verde";
    return vermelhos.includes(n)?"vermelho":"preto";
}

for(let i=0;i<=36;i++){
    let b=document.createElement("button");
    b.innerText=i;
    b.className="btn";
    b.onclick=()=>registrar(i);
    botoes.appendChild(b);
}

const historicoDiv=document.getElementById("historico");

// REGISTRAR
function registrar(num){

    // 🔒 trava após vitória/derrota
    if(esperandoNovoGiro){
        esperandoNovoGiro=false;
        return;
    }

    historico.push(num);

    let d=document.createElement("div");
    d.className="bolinha "+cor(num);
    d.innerText=num;
    historicoDiv.appendChild(d);
    historicoDiv.scrollLeft=historicoDiv.scrollWidth;

    if(entradaAtual){
        verificarResultado(num);
    }

    analisar();
}

// ANALISE
let p=0;
setInterval(()=>{
    if(!entradaAtual){
        p=(p+1)%4;
        analise.innerText="🎡 Em análise"+".".repeat(p);
    }
},500);

// ANALISAR
function analisar(){
    if(entradaAtual || esperandoNovoGiro) return;
    if(historico.length<6) return;

    let ultimos=historico.slice(-6);
    let cores=ultimos.map(cor);

    let v=cores.filter(c=>c==="vermelho").length;
    let pr=cores.filter(c=>c==="preto").length;

    let valor=null;

    if(v>=4) valor="vermelho";
    if(pr>=4) valor="preto";

    if(!valor) return;

    entradaAtual={valor};

    sugestao.innerHTML="🎯 ENTRADA:<br>"+valor.toUpperCase()+" + (0)";
    resultadoNeon.innerHTML="";
    gale=0;
}

// RESULTADO
function verificarResultado(num){

    let ganhou = num===0 || cor(num)===entradaAtual.valor;

    if(ganhou){

        vitorias++;
        resultadoNeon.innerHTML="✅ VITÓRIA";
        resultadoNeon.className="win";

        sugestao.innerHTML="";
        entradaAtual=null;
        gale=0;

        // 🔥 impede nova entrada imediata
        esperandoNovoGiro=true;

    }else{

        if(gale===0){

            gale=1;
            resultadoNeon.innerHTML="⚠️ GALE 1";
            resultadoNeon.className="gale";

        }else{

            derrotas++;
            resultadoNeon.innerHTML="❌ DERROTA";
            resultadoNeon.className="loss";

            sugestao.innerHTML="";
            entradaAtual=null;
            gale=0;

            // 🔥 trava também na derrota
            esperandoNovoGiro=true;
        }
    }

    vitoriasEl.innerText=vitorias;
    derrotasEl.innerText=derrotas;
}

const vitoriasEl=document.getElementById("vitorias");
const derrotasEl=document.getElementById("derrotas");

</script>

</body>
</html>
